<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Licitacoes</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand fw-bold">Painel de Licitações</span>
</nav>

<div class="container-fluid mt-4">

  <!-- FILTROS -->
  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <input id="filtroCidade" class="form-control" placeholder="Cidade">
    </div>
    <div class="col-md-2">
      <input id="filtroEstado" class="form-control" placeholder="Estado">
    </div>
    <div class="col-md-3">
      <input id="filtroValor" class="form-control" placeholder="Valor mínimo">
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary w-100" onclick="aplicarFiltros()">Filtrar</button>
    </div>
  </div>

  <!-- RESUMO -->
  <div class="row mb-4">
    <div class="col-md-4">
      <div class="box-resumo">
        <small>Total de licitações</small>
        <h3 id="totalLicitacoes">0</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="box-resumo">
        <small>Valor estimado total</small>
        <h3 id="valorTotal">R$ 0,00</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="box-resumo">
        <small>Receita estimada</small>
        <h3 id="receitaEstimada">R$ 0,00</h3>
      </div>
    </div>
  </div>

  <!-- BOARD -->
  <div id="board" class="row g-4"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
